name: ⚡ Daily European Energy Price Pipeline

on:
  schedule:
    - cron: '30 7 * * *'   # Her sabah 07:30 UTC (08:30 Berlin)
  workflow_dispatch:

jobs:
  fetch-and-update:
    name: Fetch European Energy Prices
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install pandas requests pytz --quiet

      - name: 📁 Create output directory
        run: mkdir -p data/output

      - name: 🇩🇪 Fetch DE prices (SMARD)
        run: python scripts/fetch_smard.py
        env:
          PYTHONPATH: .

      - name: 🌍 Fetch all European prices (ENTSO-E)
        run: python scripts/fetch_prices_all_countries.py
        continue-on-error: true
        env:
          ENTSO_E_TOKEN: ${{ secrets.ENTSO_E_TOKEN }}
          PYTHONPATH: .

      - name: 🔗 Merge datasets
        run: python scripts/merge_data.py
        env:
          PYTHONPATH: .

      - name: ✅ Data quality check
        run: |
          python -c "
          import pandas as pd, os, sys
          files = ['prices_daily.csv', 'prices_europe.csv', 'prices_pivot.csv', 'daily_summary.csv']
          ok = True
          for f in files:
              path = f'data/output/{f}'
              if os.path.exists(path):
                  df = pd.read_csv(path)
                  print(f'✅ {f}: {len(df)} rows')
              else:
                  print(f'⚠️ {f}: not found')
          "

      - name: 💾 Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/output/*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "⚡ Auto-update energy data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ Data pushed successfully"
          fi
